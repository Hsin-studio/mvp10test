<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>非典型職涯探索測驗</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sage: #7A9E87;
    --sage-light: #B8D4C0;
    --sage-pale: #EDF4EF;
    --ink: #1E2A23;
    --ink-mid: #3D5244;
    --muted: #7A8F80;
    --cream: #F7F9F7;
    --white: #FFFFFF;
    --accent: #4A7C59;
    --accent-soft: #D6EAD9;
    --border: #D4E2D8;
    --radius: 16px;
    --radius-sm: 10px;
  }

  html, body {
    height: 100%;
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--cream);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  .screen {
    display: none;
    min-height: 100dvh;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
    animation: fadeUp 0.45s ease both;
  }
  .screen.active { display: flex; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── COVER ── */
  #screen-cover {
    background: linear-gradient(160deg, #EDF4EF 0%, #F7F9F7 60%, #E8F0EA 100%);
    text-align: center;
  }

  .cover-badge {
    display: inline-block;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    padding: 5px 14px;
    border-radius: 999px;
    margin-bottom: 28px;
  }

  .cover-title {
    font-size: clamp(26px, 6vw, 38px);
    font-weight: 700;
    line-height: 1.3;
    color: var(--ink);
    margin-bottom: 20px;
    letter-spacing: -0.01em;
  }
  .cover-title em {
    font-style: normal;
    color: var(--accent);
  }

  .cover-tagline {
    font-size: 15px;
    color: var(--ink-mid);
    line-height: 1.9;
    margin-bottom: 32px;
    max-width: 340px;
  }

  .cover-features {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 40px;
    text-align: left;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    max-width: 360px;
    width: 100%;
  }
  .cover-feature {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 14px;
    color: var(--ink-mid);
    line-height: 1.5;
  }
  .cover-feature-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--sage);
    margin-top: 6px;
    flex-shrink: 0;
  }

  .cover-meta {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 32px;
  }

  /* ── QUIZ ── */
  #screen-quiz {
    justify-content: flex-start;
    padding-top: 0;
  }

  .quiz-header {
    width: 100%;
    max-width: 480px;
    padding: 20px 20px 0;
    flex-shrink: 0;
  }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  .progress-label {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }
  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--sage);
    border-radius: 999px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  .quiz-body {
    flex: 1;
    width: 100%;
    max-width: 480px;
    padding: 24px 20px 120px;
    overflow-y: auto;
  }

  .question-num {
    font-size: 12px;
    color: var(--sage);
    font-weight: 500;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }

  .question-text {
    font-size: 18px;
    font-weight: 500;
    line-height: 1.6;
    color: var(--ink);
    margin-bottom: 28px;
  }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    width: 100%;
    font-family: inherit;
  }
  .option-btn:hover {
    border-color: var(--sage-light);
    background: var(--sage-pale);
    transform: translateY(-1px);
  }
  .option-btn.selected {
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .option-btn:active { transform: scale(0.98); }

  .option-letter {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--border);
    color: var(--ink-mid);
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, color 0.2s;
  }
  .option-btn.selected .option-letter {
    background: var(--accent);
    color: var(--white);
  }

  .option-text {
    font-size: 14px;
    line-height: 1.6;
    color: var(--ink-mid);
    padding-top: 4px;
  }
  .option-btn.selected .option-text {
    color: var(--ink);
    font-weight: 500;
  }

  .quiz-footer {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    padding: 16px 20px 28px;
    background: linear-gradient(to top, var(--cream) 80%, transparent);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  /* ── BUTTONS ── */
  .btn-primary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--accent);
    color: var(--white);
    border: none;
    border-radius: 999px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    padding: 14px 36px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 2px 12px rgba(74,124,89,0.25);
    max-width: 360px;
    width: 100%;
  }
  .btn-primary:hover {
    background: var(--ink-mid);
    box-shadow: 0 4px 20px rgba(30,42,35,0.2);
    transform: translateY(-1px);
  }
  .btn-primary:active { transform: scale(0.97); }
  .btn-primary:disabled {
    background: var(--border);
    color: var(--muted);
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }

  .btn-skip {
    background: none;
    border: none;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
    padding: 4px 8px;
  }
  .btn-skip:hover { color: var(--ink-mid); }

  /* ── RESULT ── */
  #screen-result {
    justify-content: flex-start;
    padding: 0;
    align-items: stretch;
  }

  .result-hero {
    background: linear-gradient(160deg, var(--sage-pale) 0%, var(--cream) 100%);
    padding: 40px 24px 32px;
    text-align: center;
  }

  .result-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 5px 14px;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .result-emoji {
    font-size: 48px;
    line-height: 1;
    margin-bottom: 12px;
  }

  .result-type-en {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--sage);
    font-weight: 500;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .result-type-zh {
    font-size: 28px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 16px;
  }

  .result-position {
    font-size: 13px;
    color: var(--sage);
    font-weight: 500;
    margin-bottom: 10px;
  }

  .result-description {
    font-size: 14px;
    color: var(--ink-mid);
    line-height: 1.9;
    max-width: 360px;
    margin: 0 auto;
    text-align: left;
  }

  .result-quote {
    background: var(--white);
    border-left: 3px solid var(--sage);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 12px 16px;
    margin: 14px 0;
    font-size: 14px;
    color: var(--ink-mid);
    line-height: 1.7;
    font-style: italic;
  }

  /* Chart */
  .chart-wrap {
    padding: 28px 24px 0;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
  }

  .chart-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 12px;
    letter-spacing: 0.05em;
  }

  .quadrant-chart {
    width: 100%;
    aspect-ratio: 1;
    max-width: 300px;
    margin: 0 auto;
  }

  .quadrant-svg { width: 100%; height: 100%; }

  /* Result details */
  .result-details {
    padding: 0 24px 24px;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
  }

  .result-section { margin-top: 28px; }

  .result-section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .strength-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .strength-block {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px;
  }

  .strength-block-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .strength-block-body {
    font-size: 13px;
    color: var(--ink-mid);
    line-height: 1.75;
  }

  .strength-block-body ul {
    padding-left: 0;
    list-style: none;
    margin-top: 6px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .strength-block-body ul li::before {
    content: "→ ";
    color: var(--sage);
    font-weight: 500;
  }

  .next-steps {
    background: var(--accent-soft);
    border-radius: var(--radius);
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .next-step-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .step-num {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--white);
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .step-content { flex: 1; }

  .step-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .step-body {
    font-size: 13px;
    color: var(--ink-mid);
    line-height: 1.7;
  }

  .step-body ul {
    padding-left: 0;
    list-style: none;
    margin-top: 4px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .step-body ul li::before {
    content: "· ";
    color: var(--sage);
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 28px 0;
    max-width: 480px;
    width: calc(100% - 48px);
    align-self: center;
  }

  .result-footer {
    margin: 0 24px 12px;
    max-width: 432px;
    align-self: center;
    width: calc(100% - 48px);
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    text-align: center;
  }

  .footer-text {
    font-size: 14px;
    color: var(--ink-mid);
    line-height: 1.8;
    margin-bottom: 20px;
  }

  .btn-cta {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--accent);
    color: var(--white);
    border: none;
    border-radius: 999px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    padding: 14px 32px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, transform 0.15s;
    width: 100%;
    box-shadow: 0 2px 12px rgba(74,124,89,0.2);
  }
  .btn-cta:hover { background: var(--ink-mid); transform: translateY(-1px); }

  .btn-retake {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: none;
    color: var(--muted);
    border: 1.5px solid var(--border);
    border-radius: 999px;
    font-family: inherit;
    font-size: 13px;
    padding: 10px 24px;
    cursor: pointer;
    margin-top: 10px;
    width: 100%;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-retake:hover { border-color: var(--sage); color: var(--ink-mid); }

  .ig-footer {
    text-align: center;
    padding: 16px 24px 36px;
    font-size: 12px;
    color: var(--muted);
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
    line-height: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .ig-footer a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }
  .ig-footer a:hover { text-decoration: underline; }

  @media (prefers-reduced-motion: reduce) {
    .screen { animation: none; }
    * { transition: none !important; }
  }
</style>
</head>
<body>

<!-- ══ COVER ══ -->
<div class="screen active" id="screen-cover">
  <span class="cover-badge">非典型職涯探索測驗</span>
  <h1 class="cover-title">測測你的<br><em>非典型職涯</em><br>發展潛力✨</h1>
  <p class="cover-tagline">
    傳統職涯只有一條路<br>
    但現在的你，可以重新設計<br>
    自己的工作與人生組合
  </p>
  <div class="cover-features">
    <div class="cover-feature">
      <div class="cover-feature-dot"></div>
      <span>你的職涯掌控程度</span>
    </div>
    <div class="cover-feature">
      <div class="cover-feature-dot"></div>
      <span>目前累積的資源與優勢</span>
    </div>
    <div class="cover-feature">
      <div class="cover-feature-dot"></div>
      <span>下一階段適合發展的可能性</span>
    </div>
  </div>
  <p class="cover-meta">10 題 · 約 1 分鐘</p>
  <button class="btn-primary" onclick="startQuiz()">立即測驗 →</button>
</div>

<!-- ══ QUIZ ══ -->
<div class="screen" id="screen-quiz">
  <div class="quiz-header">
    <div class="progress-row">
      <span class="progress-label" id="progress-label">1 / 10</span>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:10%"></div>
      </div>
    </div>
  </div>
  <div class="quiz-body" id="quiz-body"></div>
  <div class="quiz-footer">
    <button class="btn-primary" id="btn-next" onclick="nextQuestion()" disabled>下一題</button>
    <button class="btn-skip" onclick="skipQuestion()">略過此題</button>
  </div>
</div>

<!-- ══ RESULT ══ -->
<div class="screen" id="screen-result">
  <div class="result-hero">
    <div class="result-badge">✦ 測驗結果</div>
    <div class="result-emoji" id="r-emoji"></div>
    <div class="result-type-en" id="r-type-en"></div>
    <div class="result-type-zh" id="r-type-zh"></div>
    <div class="result-position" id="r-position"></div>
    <div class="result-description" id="r-desc"></div>
  </div>

  <div class="chart-wrap">
    <div class="chart-label" style="text-align:center;">你的職涯發展座標</div>
    <div class="quadrant-chart" style="max-width:520px;">
      <svg class="quadrant-svg" viewBox="0 0 300 300" id="chart-svg"></svg>
    </div>
  </div>

  <div class="result-details">
    <div class="result-section">
      <div class="result-section-title">你的優勢</div>
      <div class="strength-list" id="r-strengths"></div>
    </div>
    <div class="result-section">
      <div class="result-section-title">下一步探索與建議</div>
      <div class="next-steps" id="r-nextsteps"></div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="result-footer">
    <p class="footer-text">如果你想更深入了解自己的非典型職涯方向與下一步，歡迎預約 30 分鐘免費諮詢，一起整理你的可能性。</p>
    <a href="https://calendly.com/yunghsin-hu/coachpractise" target="_blank" class="btn-cta">立即預約</a>
    <button class="btn-retake" onclick="retake()">重新測驗</button>
  </div>

  <div class="ig-footer">
    <div>Hsin｜非典型職涯設計教練</div>
    <a href="https://www.instagram.com/hsin.careerdesign" target="_blank">@hsin.careerdesign</a>
  </div>
</div>

<script>
const questions = [
  {
    id: 1, axis: 'X',
    text: '目前你對自己的職涯方向感覺比較接近哪一種？',
    options: [
      { letter: 'A', text: '我正在探索自己真正適合什麼，希望找到更多可能', score: -2 },
      { letter: 'B', text: '我知道目前狀態需要調整，但還沒有明確方向', score: -1 },
      { letter: 'C', text: '我大致知道自己想發展的方向，只是需要更整理', score: 1 },
      { letter: 'D', text: '我很清楚自己想創造什麼樣的職涯方向', score: 2 },
    ]
  },
  {
    id: 2, axis: 'X',
    text: '如果重新設計你的職涯，你目前最想探索的是？',
    options: [
      { letter: 'A', text: '了解自己的興趣、能力與適合的位置', score: -2 },
      { letter: 'B', text: '找出有哪些可能方向值得嘗試', score: -1 },
      { letter: 'C', text: '發展符合自己能力與價值的方向', score: 1 },
      { letter: 'D', text: '建立清楚的個人職涯定位與發展路徑', score: 2 },
    ]
  },
  {
    id: 3, axis: 'Y',
    text: '過去一年，你對新的職涯可能做過哪些嘗試？',
    options: [
      { letter: 'A', text: '目前主要維持現況，還沒有開始探索', score: -2 },
      { letter: 'B', text: '有想法，但還在觀察與準備階段', score: -1 },
      { letter: 'C', text: '有開始學習、累積新能力或接觸新領域', score: 1 },
      { letter: 'D', text: '已主動測試新的方向，創造新的經驗', score: 2 },
    ]
  },
  {
    id: 4, axis: 'Y',
    text: '當你想到職涯改變時，你比較像？',
    options: [
      { letter: 'A', text: '會先大量思考，還沒有開始行動', score: -2 },
      { letter: 'B', text: '有興趣探索，但需要更多準備', score: -1 },
      { letter: 'C', text: '會嘗試一些新的做法確認可能性', score: 1 },
      { letter: 'D', text: '會透過實驗與行動找到適合方向', score: 2 },
    ]
  },
  {
    id: 5, axis: 'X',
    text: '你目前對自己的優勢與價值感覺如何？',
    options: [
      { letter: 'A', text: '我還在認識自己有哪些能力與特色', score: -2 },
      { letter: 'B', text: '我知道一些優勢，但還不知道如何運用', score: -1 },
      { letter: 'C', text: '我知道自己的強項，也開始思考如何發展', score: 1 },
      { letter: 'D', text: '我很清楚自己的價值，知道如何放大它', score: 2 },
    ]
  },
  {
    id: 6, axis: 'X',
    text: '面對未來職涯選擇，你通常會？',
    options: [
      { letter: 'A', text: '想先找到答案，再決定下一步', score: -2 },
      { letter: 'B', text: '需要更多資訊與探索，才比較能判斷', score: -1 },
      { letter: 'C', text: '有方向後會開始規劃下一階段', score: 1 },
      { letter: 'D', text: '會主動設計符合自己的職涯策略', score: 2 },
    ]
  },
  {
    id: 7, axis: 'Y',

let current = 0;
let answers = new Array(10).fill(null);
let selectedIndex = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  el.classList.add('active');
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = '';
}

function startQuiz() {
  current = 0;
  answers = new Array(10).fill(null);
  renderQuestion();
  showScreen('screen-quiz');
}

function renderQuestion() {
  const q = questions[current];
  selectedIndex = answers[current];
  document.getElementById('progress-label').textContent = `${current + 1} / ${questions.length}`;
  document.getElementById('progress-fill').style.width = `${((current + 1) / questions.length) * 100}%`;

  const body = document.getElementById('quiz-body');
  body.innerHTML = `
    <div class="question-num">Q${String(current + 1).padStart(2, '0')}</div>
    <div class="question-text">${q.text}</div>
    <div class="options-list" id="options-list">
      ${q.options.map((opt, i) => `
        <button class="option-btn ${selectedIndex === i ? 'selected' : ''}" onclick="selectOption(${i})">
          <span class="option-letter">${opt.letter}</span>
          <span class="option-text">${opt.text}</span>
        </button>
      `).join('')}
    </div>
  `;

  const btnNext = document.getElementById('btn-next');
  btnNext.disabled = selectedIndex === null;
  btnNext.textContent = current === questions.length - 1 ? '查看結果 ✦' : '下一題';
}

function selectOption(index) {
  selectedIndex = index;
  answers[current] = index;
  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.classList.toggle('selected', i === index);
  });
  document.getElementById('btn-next').disabled = false;
}

function nextQuestion() {
  if (selectedIndex === null) return;
  if (current < questions.length - 1) {
    current++;
    selectedIndex = answers[current];
    renderQuestion();
    document.getElementById('quiz-body').scrollTop = 0;
  } else {
    showResult();
  }
}

function skipQuestion() {
  answers[current] = null;
  selectedIndex = null;
  if (current < questions.length - 1) {
    current++;
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  let xScore = 0, yScore = 0;
  questions.forEach((q, i) => {
    if (answers[i] !== null) {
      const val = q.options[answers[i]].score;
      if (q.axis === 'X') xScore += val;
      else yScore += val;
    }
  });

  // X軸：職涯方向清晰度（負=探索，正=清晰）
  // Y軸：職涯探索行動力（負=思索中，正=有行動力）
  // 左上(X<0,Y>0) = 職涯設計者  右上(X>0,Y>0) = 多元創造者
  // 左下(X<0,Y<0) = 潛能探索者  右下(X>0,Y<0) = 價值重塑者
  let qKey;
  if (xScore <= 0 && yScore > 0)  qKey = 'CD'; // 左上：職涯設計者
  else if (xScore > 0 && yScore > 0)  qKey = 'PC'; // 右上：多元創造者
  else if (xScore > 0 && yScore <= 0) qKey = 'CR'; // 右下：價值重塑者
  else                                  qKey = 'PE'; // 左下：潛能探索者

  const data = quadrants[qKey];

  document.getElementById('r-emoji').textContent = data.emoji;
  document.getElementById('r-type-en').textContent = data.typeEn;
  document.getElementById('r-type-zh').textContent = data.typeZh;
  document.getElementById('r-position').textContent = data.position;

  // Build description with optional quotes
  let descHTML = `<p>${data.descParts[0]}</p>`;
  if (data.quotes.length > 0) {
    descHTML += `<div class="result-quote">${data.quotes.join('<br>')}</div>`;
  }
  if (data.descParts[1]) {
    descHTML += `<p style="margin-top:10px">${data.descParts[1]}</p>`;
  }
  document.getElementById('r-desc').innerHTML = descHTML;

  // Strengths
  document.getElementById('r-strengths').innerHTML = data.strengths.map((s, i) => `
    <div class="strength-block">
      <div class="strength-block-title"><span style="color:var(--sage)">0${i+1}</span> ${s.title}</div>
      <div class="strength-block-body">
        ${s.body}
        ${s.items.length ? `<ul>${s.items.map(it => `<li>${it}</li>`).join('')}</ul>` : ''}
      </div>
    </div>
  `).join('');

  // Next steps
  document.getElementById('r-nextsteps').innerHTML = data.nextSteps.map((s, i) => `
    <div class="next-step-item">
      <span class="step-num">${i + 1}</span>
      <div class="step-content">
        <div class="step-title">${s.title}</div>
        <div class="step-body">
          ${s.body}
          ${s.items.length ? `<ul>${s.items.map(it => `<li>${it}</li>`).join('')}</ul>` : ''}
        </div>
      </div>
    </div>
  `).join('');

  drawChart(xScore, yScore, qKey);
  showScreen('screen-result');
  document.getElementById('screen-result').scrollTop = 0;
}

function drawChart(xScore, yScore, qKey) {
  const svg = document.getElementById('chart-svg');
  const W = 300, H = 300;
  const cx = W / 2, cy = H / 2;
  const pad = 32;
  const range = 10;

  const dotX = cx + (xScore / range) * (cx - pad);
  const dotY = cy - (yScore / range) * (cy - pad);

  // Highlight active quadrant
  const qColors = {
    'Q1': { x: pad,  y: pad,  fill: '#D6EAD9' },
    'Q2': { x: cx,   y: pad,  fill: '#D6EAD9' },
    'Q3': { x: cx,   y: cy,   fill: '#D6EAD9' },
    'Q4': { x: pad,  y: cy,   fill: '#D6EAD9' },
  };

  const bgColors = {
    'Q1': '#EDF4EF', 'Q2': '#EDF4EF', 'Q3': '#EDF4EF', 'Q4': '#EDF4EF'
  };

  svg.innerHTML = `
    <!-- 左上: 職涯設計者(CD) X<0 Y>0 -->
    <rect x="${pad}" y="${pad}" width="${cx-pad}" height="${cy-pad}" fill="${qKey==='CD' ? '#C8E0CC' : '#EDF4EF'}" rx="4"/>
    <!-- 右上: 多元創造者(PC) X>0 Y>0 -->
    <rect x="${cx}" y="${pad}" width="${cx-pad}" height="${cy-pad}" fill="${qKey==='PC' ? '#C8E0CC' : '#EDF4EF'}" rx="4"/>
    <!-- 右下: 價值重塑者(CR) X>0 Y<0 -->
    <rect x="${cx}" y="${cy}" width="${cx-pad}" height="${cy-pad}" fill="${qKey==='CR' ? '#C8E0CC' : '#EDF4EF'}" rx="4"/>
    <!-- 左下: 潛能探索者(PE) X<0 Y<0 -->
    <rect x="${pad}" y="${cy}" width="${cx-pad}" height="${cy-pad}" fill="${qKey==='PE' ? '#C8E0CC' : '#EDF4EF'}" rx="4"/>

    <!-- 左上標籤: 職涯設計者 -->
    <text x="${(pad+cx)/2}" y="${(pad+cy)/2 - 6}" text-anchor="middle" font-size="8.5" fill="${qKey==='CD'?'#2D6040':'#7A8F80'}" font-family="'Noto Sans TC',sans-serif" font-weight="${qKey==='CD'?'700':'400'}">🧭 職涯設計者</text>
    <!-- 右上標籤: 多元創造者 -->
    <text x="${(cx+W-pad)/2}" y="${(pad+cy)/2 - 6}" text-anchor="middle" font-size="8.5" fill="${qKey==='PC'?'#2D6040':'#7A8F80'}" font-family="'Noto Sans TC',sans-serif" font-weight="${qKey==='PC'?'700':'400'}">🚀 多元創造者</text>
    <!-- 右下標籤: 價值重塑者 -->
    <text x="${(cx+W-pad)/2}" y="${(cy+H-pad)/2 - 6}" text-anchor="middle" font-size="8.5" fill="${qKey==='CR'?'#2D6040':'#7A8F80'}" font-family="'Noto Sans TC',sans-serif" font-weight="${qKey==='CR'?'700':'400'}">🌱 價值重塑者</text>
    <!-- 左下標籤: 潛能探索者 -->
    <text x="${(pad+cx)/2}" y="${(cy+H-pad)/2 - 6}" text-anchor="middle" font-size="8.5" fill="${qKey==='PE'?'#2D6040':'#7A8F80'}" font-family="'Noto Sans TC',sans-serif" font-weight="${qKey==='PE'?'700':'400'}">🌿 潛能探索者</text>

    <line x1="${pad}" y1="${cy}" x2="${W-pad}" y2="${cy}" stroke="#B8D4C0" stroke-width="1"/>
    <line x1="${cx}" y1="${pad}" x2="${cx}" y2="${H-pad}" stroke="#B8D4C0" stroke-width="1"/>

    <text x="${pad-3}" y="${cy+1}" text-anchor="end" font-size="8" fill="#A0AEA4" dominant-baseline="central" font-family="'Noto Sans TC',sans-serif">探索度</text>
    <text x="${W-pad+3}" y="${cy+1}" text-anchor="start" font-size="8" fill="#A0AEA4" dominant-baseline="central" font-family="'Noto Sans TC',sans-serif">清晰度</text>
    <text x="${cx}" y="${pad-8}" text-anchor="middle" font-size="8" fill="#A0AEA4" font-family="'Noto Sans TC',sans-serif">行動力</text>
    <text x="${cx}" y="${H-pad+14}" text-anchor="middle" font-size="8" fill="#A0AEA4" font-family="'Noto Sans TC',sans-serif">整合力</text>

    <circle cx="${dotX}" cy="${dotY}" r="16" fill="#4A7C59" opacity="0.12"/>
    <circle cx="${dotX}" cy="${dotY}" r="9" fill="#4A7C59" opacity="0.22"/>
    <circle cx="${dotX}" cy="${dotY}" r="6" fill="#4A7C59"/>
    <circle cx="${dotX}" cy="${dotY}" r="2.5" fill="white"/>
  `;
}
